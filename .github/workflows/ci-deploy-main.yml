name: ci-deploy-main

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-deploy-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add production host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync repo on VPS and deploy
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_APP_DIR: /opt/apps/waba
        run: |
          ssh -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" "PROD_APP_DIR='$PROD_APP_DIR' bash -s" <<'EOF'
          set -euo pipefail

          cd "$PROD_APP_DIR"

          git fetch origin
          git reset --hard
          git clean -fd

          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          else
            git checkout -b main origin/main
          fi

          git reset --hard origin/main
          git clean -fd

          docker compose up -d --build api web
          docker compose ps

          api_ok=false
          web_ok=false

          for attempt in $(seq 1 30); do
            api_code="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:4311/api/auth/me || true)"
            web_code="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:4310 || true)"

            if [ "$api_code" = "401" ] || [ "$api_code" = "200" ]; then
              api_ok=true
            fi

            if [ "$web_code" = "200" ]; then
              web_ok=true
            fi

            if [ "$api_ok" = true ] && [ "$web_ok" = true ]; then
              break
            fi

            sleep 2
          done

          docker inspect -f '{{.State.Status}} {{.State.OOMKilled}} {{.RestartCount}}' waba-api-1

          [ "$api_ok" = true ]
          [ "$web_ok" = true ]
          EOF
